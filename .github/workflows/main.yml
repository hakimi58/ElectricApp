name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: Peter-S-W-G/buildozer-action@v2
        with:
          buildozer_version: master
          command: buildozer android debug
